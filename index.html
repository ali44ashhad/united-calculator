<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Free online calculator - United Calculator</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f8f9ff;
        color: #0b1c30;
      }
      #app-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .shell-header {
        height: 64px;
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        align-items: center;
        padding: 0 24px;
        flex-shrink: 0;
      }
      .shell-logo {
        font-size: 1.25rem;
        font-weight: 700;
        color: #2563eb;
        text-decoration: none;
        letter-spacing: -0.025em;
      }
      .shell-hero {
        background: #fff;
        padding: 96px 24px 64px;
        text-align: center;
        flex: 1;
      }
      .shell-hero h1 {
        font-size: 1.875rem;
        font-weight: 700;
        margin: 0 0 24px;
        line-height: 1.25;
        color: #0b1c30;
      }
      .shell-hero p {
        font-size: 1.125rem;
        color: #434655;
        max-width: 42rem;
        margin: 0 auto 48px;
        line-height: 1.6;
      }
      .shell-search {
        max-width: 48rem;
        height: 72px;
        margin: 0 auto;
        border-radius: 9999px;
        border: 2px solid #f3f4f6;
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        background: #fff;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=block"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <div id="app-shell">
        <header class="shell-header">
          <a href="/" class="shell-logo">United Calculator</a>
        </header>
        <main id="shell-main" class="shell-hero">
          <h1>200+ Specialized Tools at Your Fingertips</h1>
          <p>
            Precision-engineered calculators for finance, science, and everyday
            life. Fast, accurate, and completely free.
          </p>
          <div class="shell-search" aria-hidden="true"></div>
        </main>
      </div>
    </div>
    <script>
      (function () {
        var path = location.pathname.replace(/\/$/, "") || "/";
        if (path !== "/") {
          var main = document.getElementById("shell-main");
          if (!main) return;
          main.className = "";
          main.style.cssText = "flex:1;background:#fff;min-height:60vh";
          main.innerHTML = "";
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
